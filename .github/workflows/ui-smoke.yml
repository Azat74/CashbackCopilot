name: UI Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ui-smoke:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      IOS_DESTINATION: platform=iOS Simulator,OS=latest,name=iPhone 16 Pro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run manual recommendation smoke
        run: |
          xcodebuild \
            -scheme CashbackCopilotUI \
            -destination "$IOS_DESTINATION" \
            -parallel-testing-enabled NO \
            -only-testing:CashbackCopilotUITests/CashbackCopilotUITests/testManualRecommendationHappyPath \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Run QR scanner smoke
        run: |
          xcodebuild \
            -scheme CashbackCopilotUI \
            -destination "$IOS_DESTINATION" \
            -parallel-testing-enabled NO \
            -only-testing:CashbackCopilotUITests/CashbackCopilotUITests/testQrScannerParseFlow \
            test \
            CODE_SIGNING_ALLOWED=NO
