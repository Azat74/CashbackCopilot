name: Business Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      IOS_DESTINATION: platform=iOS Simulator,OS=latest,name=iPhone 16 Pro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run business guardrail tests
        run: |
          xcodebuild \
            -scheme CashbackCopilot \
            -destination "$IOS_DESTINATION" \
            -only-testing:CashbackCopilotTests/BusinessGuardrailsTests \
            test \
            CODE_SIGNING_ALLOWED=NO
