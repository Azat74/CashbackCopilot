name: Decision Logic Regression Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  regression:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run recommendation regression tests
        run: |
          xcodebuild \
            -scheme CashbackCopilot \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            -only-testing:CashbackCopilotTests/RecommendationRegressionTests \
            test \
            CODE_SIGNING_ALLOWED=NO
